<!DOCTYPE HTML>
<html>
<head>
	<title>p5 sketches by brayvid</title>
	<link rel="stylesheet" type="text/css" href="style.css">
	<meta charset="utf-8" name="viewport" sketch="user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1,width=device-width">
	<script type="text/javascript" src="https://code.jquery.com/jquery-3.1.1.min.js"
		integrity="sha256-hVVnYaiADRTO2PzUGmuLJr8BLUSjGIZsDYGmIJLv2b8="
		crossorigin="anonymous"></script>
	<script src="justified/jquery.justifiedGallery.min.js" type="text/javascript"></script>
	<link rel="stylesheet" type="text/css" href="justified/justifiedGallery.css">
</head>
<body>
	<div id="container">

		<section id="header">
			<h2 id="title">
				<span id="physical-principles">principles of physics</span><br>
				<span id="in">in</span> 
				<a id="p5-link" href="http://p5js.org">p5.js</a>
			</h2>
		</section>

		<section id="content">
			<div id="sketch-list">
				<a class="sketch-link" href="https://ccny-physics-sims.github.io/sims/ray-diagram/">
			        <img src="img/ray-screenshot.png"/>
			        <div class="caption">
				        <strong>Converging lens ray diagram</strong>
				        <div>Published in the CCNY Science Sims catalog</div>
				    
    				</div>
			    </a>
			    <a class="sketch-link" href="ball-collider">
			        <img src="img/ball-screenshot.png"/>
			        <div class="caption">
				        <strong>Circle-circle collision simulator</strong>
				        <div>Demonstrates momentum conservation</div>
    				</div>
			    </a>
			</div>
		</section>

		<section id="bottom-space">
		</section>

		<section id="footer">
			<table id="footer-content">
				<tr>
					<td class="footer-link"><a id="name-link" class="footer-link-inner" href="https://github.com/brayvid">github &#187; brayvid</a></td>
					<td class="footer-link"><a id="dev-link" class="footer-link-inner" href="in-dev">in development</a></td>
				</tr>	
			</table>
		</section>

	</div>

	<script type="text/javascript">
		$("#sketch-list").justifiedGallery({
			rowHeight:260,
			maxRowHeight: false,
			captions: true,
			border: -1,
			margins: 40,
			lastRow: "center"
		});
	</script>

</body>
</html>
