<!DOCTYPE HTML>
<html>
<head>
	<title>physical simulations in p5.js</title>
	<link rel="stylesheet" type="text/css" href="style.css">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="text/javascript" src="https://code.jquery.com/jquery-3.1.1.min.js"
		integrity="sha256-hVVnYaiADRTO2PzUGmuLJr8BLUSjGIZsDYGmIJLv2b8="
		crossorigin="anonymous"></script>
	<script src="justified/jquery.justifiedGallery.js" type="text/javascript"></script>
	<link rel="stylesheet" type="text/css" href="justified/justifiedGallery.css">
</head>
<body>
	<div id="container">

		<section id="header">
			<h2 id="title">
				<span id="physical-principles">principles of physics</span><br>
				<span id="in">in</span> 
				<a class="p5-link" href="http://p5js.org">p5<span id="asterisk">*</span> js</a>
			</h2>
		</section>

		<section id="content">
			<div id="sketch-list">
				<a class="sketch-link" href="https://ccny-physics-sims.github.io/sims/ray-diagram/">
			        <img src="img/ray-screenshot.png"/>
			        <div class="caption">
				        <strong>Converging lens ray diagram</strong>
				    
    				</div>
			    </a>
			    <a class="sketch-link" href="ball-collider">
			        <img src="img/ball-screenshot.png"/>
			        <div class="caption">
				        <strong>Circle-circle collider</strong>
				       <!--  <div>Demonstrates momentum conservation</div> -->
    				</div>
			    </a>
			</div>
		</section>
		
		<section id="bottom-space">
		</section>

		<section id="footer">
			<table id="footer-content">
				<tr>
					<td class="footer-link"><a id="name-link" class="footer-link-inner" href="https://github.com/brayvid">github</a></td>
					<td class="footer-link"><a id="ccny-link" class="footer-link-inner" href="http://sciencesims.com">science sims</a></td>
					<td class="footer-link"><a id="misc-link" class="footer-link-inner" href="misc">misc.</a></td>
					<td class="footer-link"><a id="dev-link" class="footer-link-inner" href="in-dev">in dev.</a></td>
	
				</tr>	
			</table>
		</section>

	</div>

	<script type="text/javascript">
		$("#sketch-list").justifiedGallery({
			rowHeight:300,
			captions: true,
			border: -1,
			margins: 15,
			lastRow: "center"
		});
	</script>

</body>
</html>
