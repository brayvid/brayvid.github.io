    <!-- Using 'defer' is still correct! It prevents these scripts from blocking page rendering. -->

	<script defer src="homepage/jquery.justifiedGallery.min.js" type="text/javascript"></script>

	<script type="text/javascript">
        // JAVASCRIPT FIX: We put the DOMContentLoaded listener back.
        // This ensures the code inside only runs after the deferred scripts (like jQuery) are ready.
        document.addEventListener("DOMContentLoaded", function(event) {
            $("#sketch-list").justifiedGallery({
                rowHeight: 300,
                captions: true,
                border: -1,
                margins: 15,
                lastRow: "center"
            }).on('jg.complete', function () {
                $(this).find('a').css('opacity', 1); // Fade in images when layout is complete
            });
        });
	</script>
