    <!-- 
      NOTE: The <meta http-equiv="refresh"> tag has been removed. 
      JavaScript must handle the routing so subpaths aren't forced to the root URL.
    -->

    <!--

    <!-- Core SEO Content -->
    <title>Blake Rayvid | Data Scientist</title>
    <meta name="description" content="Developer with 15+ years of programming experience, skilled in machine learning, financial modeling, and data visualization.">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://blakerayvid.com/">

    <!-- Open Graph Data (for Facebook, LinkedIn, etc.) -->
    <meta property="og:title" content="Blake Rayvid | Data Scientist">
    <meta property="og:description" content="Developer with 15+ years of programming experience, skilled in machine learning, financial modeling, and data visualization.">

    <!-- Twitter Card Data -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Blake Rayvid | Data Scientist">
    <meta name="twitter:description" content="Developer with 15+ years of programming experience, skilled in machine learning, financial modeling, and data visualization.">

    <!-- A minimal style for the fallback message -->
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <h1>Redirecting...</h1>
    <p>
        If you are not automatically redirected, 
        <a id="fallback-link" href="https://blakerayvid.com/">please click here to continue</a>.
    </p>

    <!-- JavaScript Redirect Router -->
    <script>
        // 1. EXTENSIBLE ROUTING MAP
        // Add new forwarding instances here as needed
        const routes = {
            "/optics": "https://sims.blakerayvid.com/optics",
            "/collide": "https://sims.blakerayvid.com/collide",
            "/threebody": "https://sims.blakerayvid.com/threebody",
            "/news": "https://news.blakerayvid.com",
            "/stocks": "https://stocks.blakerayvid.com",
            "/cv": "https://cv.blakerayvid.com",
            "/covidnyc" : "https://covidnyc.blakerayvid.com",
            "/routecat": "https://routecat.blakerayvid.com",
            "/network": "https://network.blakerayvid.com"
            
        };

        // 2. DEFAULT DESTINATION
        // If someone visits the root site or a link that doesn't exist above
        const defaultUrl = "https://blakerayvid.com/";

        // 3. GET AND NORMALIZE CURRENT PATH
        // Grabs "/optics" from "brayvid.github.io/optics"
        let path = window.location.pathname.toLowerCase();
        
        // Remove trailing slash if a user types "/optics/"
        if (path.endsWith('/') && path.length > 1) {
            path = path.slice(0, -1);
        }

        // 4. MATCH ROUTE
        // Look up the path in our dictionary. If it doesn't exist, use the defaultUrl.
        const targetUrl = routes[path] || defaultUrl;

        // 5. UPDATE FALLBACK LINK
        // Just in case the user's browser blocks automatic redirects
        document.getElementById('fallback-link').href = targetUrl;

        // 6. EXECUTE REDIRECT
        window.location.replace(targetUrl);
    </script>
</body>
</html>
